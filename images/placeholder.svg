<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5c4"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#a67156"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5a3c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3d2817" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#warm)"/>
  <rect width="1200" height="800" fill="url(#overlay)"/>
  <!-- Mountain silhouettes -->
  <path d="M0,600 L200,450 L350,520 L500,380 L700,470 L900,350 L1100,450 L1200,410 L1200,800 L0,800 Z" fill="#6b4226" opacity="0.25"/>
  <path d="M0,680 L150,560 L320,620 L480,520 L650,590 L850,500 L1050,570 L1200,530 L1200,800 L0,800 Z" fill="#4a2e1c" opacity="0.3"/>
  <!-- Center badge -->
  <g transform="translate(600,400)" text-anchor="middle" font-family="Georgia, serif" fill="#faf6f1" opacity="0.9">
    <circle r="90" fill="none" stroke="#faf6f1" stroke-width="1.5" opacity="0.6"/>
    <text y="-10" font-size="28" font-style="italic" font-weight="400">RoseLoe</text>
    <text y="20" font-size="11" letter-spacing="4" font-weight="300">MOTEL</text>
    <text y="50" font-size="9" letter-spacing="2" opacity="0.7">PHOTO COMING SOON</text>
  </g>
</svg>
